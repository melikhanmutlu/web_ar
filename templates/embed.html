<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ model.display_name or 'ARVision 3D Model' }}</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        model-viewer {
            width: 100%; height: 100%;
            --poster-color: transparent;
        }
        model-viewer::part(default-ar-button) { display: none; }

        /* AR button */
        .embed-ar-btn {
            position: absolute; bottom: 12px; right: 12px;
            background: rgba(255,255,255,0.95); color: #1a1a2e;
            border: none; border-radius: 8px; padding: 8px 14px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
            transition: transform 0.15s, box-shadow 0.15s;
            z-index: 10;
        }
        .embed-ar-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        .embed-ar-btn svg { width: 16px; height: 16px; }

        /* Branding */
        .embed-brand {
            position: absolute; bottom: 12px; left: 12px;
            font-size: 10px; color: rgba(255,255,255,0.4);
            text-decoration: none; z-index: 10;
            transition: color 0.2s;
        }
        .embed-brand:hover { color: rgba(255,255,255,0.7); }

        /* Dimensions badge */
        .embed-dims {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.8);
            padding: 4px 8px; border-radius: 6px; font-size: 10px;
            z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <model-viewer
        id="viewer"
        src="{{ url_for('serve_converted_file', unique_id=model_unique_id, filename=actual_filename) }}"
        {% if usdz_filename %}ios-src="{{ url_for('serve_converted_file', unique_id=model_unique_id, filename=usdz_filename) }}"{% endif %}
        shadow-intensity="1.2"
        shadow-softness="0.8"
        exposure="0.96"
        tone-mapping="aces"
        camera-controls
        camera-orbit="30deg 70deg auto"
        field-of-view="24deg"
        interaction-prompt="none"
        {% if ar %}ar ar-scale="auto" ar-placement="floor"{% endif %}
        {% if autoplay %}autoplay{% endif %}
        loading="eager"
    ></model-viewer>

    {% if model_dimensions %}
    <div class="embed-dims">
        {{ model_dimensions.width }} x {{ model_dimensions.height }} x {{ model_dimensions.depth }} cm
    </div>
    {% endif %}

    {% if ar %}
    <button class="embed-ar-btn" id="arBtn" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        View in AR
    </button>
    {% endif %}

    <a class="embed-brand" href="/view/{{ model.id }}" target="_blank">Powered by ARVision</a>

    <script>
        const viewer = document.getElementById('viewer');
        const arBtn = document.getElementById('arBtn');

        {% if ar %}
        viewer.addEventListener('load', () => {
            if (viewer.canActivateAR) {
                arBtn.style.display = 'flex';
            }
        });
        arBtn?.addEventListener('click', () => viewer.activateAR());
        {% endif %}
    </script>
</body>
</html>
