<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ model.name }} · WebAR</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0e1117; }
    model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
    .ar-button {
      position: absolute; bottom: 12px; right: 12px;
      background: #4f7cff; color: #fff; border: 0; border-radius: 8px;
      padding: 8px 14px; font: 600 13px system-ui, sans-serif; cursor: pointer;
    }
  </style>
</head>
<body>
  <model-viewer
    src="{{ url_for('views.model_file', filename=model.glb_filename) }}"
    {% if model.usdz_filename %}ios-src="{{ url_for('views.model_file', filename=model.usdz_filename) }}"{% endif %}
    alt="{{ model.name }}"
    ar ar-modes="webxr scene-viewer quick-look"
    camera-controls auto-rotate
    shadow-intensity="1" environment-image="neutral">
    <button slot="ar-button" class="ar-button">AR</button>
  </model-viewer>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</body>
</html>
