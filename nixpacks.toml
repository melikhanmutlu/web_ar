[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs-18_x", "blender"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
    "npm ci",
    "chmod +x tools/FBX2glTF"
]

[start]
cmd = "chmod +x /app/tools/FBX2glTF 2>/dev/null || true && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 300 --log-level info"
