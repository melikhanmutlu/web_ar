<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ model.name }} · WebAR</title>
  <style>
    html, body { margin: 0; height: 100%; background: #16140f; }
    model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
    .ar-button {
      position: absolute; bottom: 12px; right: 12px;
      background: #c9b9f6; color: #16140f; border: 0; border-radius: 999px;
      padding: 8px 16px; font: 600 12px "Space Grotesk", system-ui, sans-serif; cursor: pointer;
    }
    .wm {
      position: absolute; top: 10px; left: 12px;
      font: 600 9px ui-monospace, monospace; letter-spacing: .14em;
      color: rgba(242,237,226,.5); text-transform: uppercase;
    }
    .wm b { color: #c9b9f6; }
  </style>
</head>
<body>
  <model-viewer
    src="{{ url_for('views.model_file', filename=model.glb_filename) }}"
    {% if model.usdz_filename %}ios-src="{{ url_for('views.model_file', filename=model.usdz_filename) }}"{% endif %}
    alt="{{ model.name }}"
    ar ar-modes="webxr scene-viewer quick-look"
    camera-controls auto-rotate
    shadow-intensity="1" environment-image="neutral">
    <button slot="ar-button" class="ar-button">◆ AR</button>
  </model-viewer>
  <a class="wm" href="/m/{{ model.id }}" target="_blank" rel="noopener">◆ WEB<b>AR</b></a>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</body>
</html>
