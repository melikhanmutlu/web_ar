<header class="top-header">
    <div class="brand-shell">
        <a href="{{ url_for('index') }}" class="brand-mark">arvision</a>
    </div>
    <nav class="top-actions" aria-label="Primary">
        <a href="{{ url_for('index') }}" class="showcase-nav-link {% if request.endpoint == 'index' %}is-active{% endif %}">home</a>
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('my_models') }}" class="showcase-nav-link {% if request.endpoint == 'my_models' %}is-active{% endif %}">my models</a>
        <form method="POST" action="{{ url_for('auth.logout') }}" class="logout-form" style="display:inline;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="showcase-nav-link" style="background:none;border:none;cursor:pointer;padding:0;font:inherit;">log out</button>
        </form>
        {% else %}
        <a href="{{ url_for('auth.register', next=request.path) }}" class="showcase-nav-link {% if request.endpoint == 'auth.register' %}is-active{% endif %}">register</a>
        <a href="{{ url_for('auth.login', next=request.path) }}" class="showcase-nav-link login-pill {% if request.endpoint == 'auth.login' %}is-active{% endif %}">login</a>
        {% endif %}
    </nav>
</header>
