[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.virtualenv", "nodejs_20", "blender", "assimp"]

[phases.install]
cmds = [
    "python -m venv /opt/venv",
    "/opt/venv/bin/pip install --upgrade pip",
    "/opt/venv/bin/pip install -r requirements.txt",
    "npm ci",
    "chmod +x tools/FBX2glTF"
]

[start]
cmd = "chmod +x /app/tools/FBX2glTF && export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/lib:/usr/lib:$(find /nix/store -name libassimp.so* -printf '%h\n' | head -n 1) && (FLASK_APP=app.py SKIP_DB_BOOTSTRAP=1 /opt/venv/bin/flask db upgrade || echo 'db upgrade skipped (stamp-on-boot will handle legacy DBs)') && (/opt/venv/bin/python worker.py &) && /opt/venv/bin/gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 8 --timeout 120 --log-level info"
